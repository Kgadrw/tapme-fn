<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="tapme is an NFC digital business card platform. Create a smart profile, share contact details, social links, and payments with a single tap — no app required."
    />
    <meta
      name="keywords"
      content="tapme, NFC business card, digital business card, digital profile, smart card, contact sharing, Rwanda, vCard, QR code profile"
    />
    <meta name="author" content="tapme" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta property="og:site_name" content="tapme" />
    <meta property="og:title" content="tapme | Share your profile with one tap." />
    <meta
      property="og:description"
      content="NFC digital business cards. One tap to share your contact details, social links, and business info."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_RW" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@tapme" />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <title>tapme | Share your profile with one tap.</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("tapme-theme") || "system";
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || (stored === "system" && systemDark);
          var root = document.documentElement;
          root.classList.toggle("dark", isDark);
          root.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
